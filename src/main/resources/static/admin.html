<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            padding: 30px;
            background:#f5f7fa;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse: collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:left;
        }

        th{
            background:#2563eb;
            color:white;
        }

        button{
            background:red;
            color:white;
            border:none;
            padding:8px 12px;
            cursor:pointer;
            border-radius:5px;
        }
        .stats{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }
        .stats{
    display:flex;
    justify-content:center;
    margin:20px 0;
}

.card{
    background:white;
    padding:20px;
    width:220px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

.card h2{
    color:#2563eb;
    font-size:32px;
}

#searchInput{
    padding:10px;
    width:250px;
    border-radius:6px;
    border:1px solid #ccc;
}

.search-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    width:200px;
    text-align:center;
}
        .search-section{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}
    </style>
</head>
<body>
<div class="stats">
    <div class="card">
        <h2 id="totalVolunteers">0</h2>
        <p>Total Volunteers</p>
    </div>
</div>

<h1>NayePankh Volunteer Management Dashboard</h1>
<p>Manage and track registered volunteers</p>

<div class="search-section">
    <input type="text" id="searchInput" placeholder="Search by name">
    <button class="search-btn" onclick="searchVolunteer()">Search</button>
</div>


<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody id="volunteerTable">
    </tbody>
</table>

<script>

    async function loadVolunteers(){

        const response = await fetch("/volunteers");
        const volunteers = await response.json();
        document.getElementById("totalVolunteers").innerText =
        volunteers.length;

        let rows = "";

        volunteers.forEach(v => {

            rows += `
            <tr>
                <td>${v.id}</td>
                <td>${v.name}</td>
                <td>${v.email}</td>
                <td>${v.phone}</td>
                <td>
                    <button onclick="deleteVolunteer(${v.id})">
                        Delete
                    </button>
                </td>
            </tr>
            `;
        });

        document.getElementById("volunteerTable").innerHTML = rows;
    }

    async function deleteVolunteer(id){

        await fetch("/volunteers/" + id,{
            method:"DELETE"
        });

        loadVolunteers();
    }

    loadVolunteers();

    async function searchVolunteer(){

    const name = document.getElementById("searchInput").value;

    const response = await fetch(
        "/volunteers/search?name=" + name
    );

    const volunteers = await response.json();

    let rows = "";

    volunteers.forEach(v => {

        rows += `
        <tr>
            <td>${v.id}</td>
            <td>${v.name}</td>
            <td>${v.email}</td>
            <td>${v.phone}</td>
            <td>
                <button onclick="deleteVolunteer(${v.id})">
                    Delete
                </button>
            </td>
        </tr>
        `;
    });

    document.getElementById("volunteerTable").innerHTML = rows;
}

</script>

</body>
</html>
